name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build TradeForge APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        env:
          PORT: 4173
          BASE_PATH: /
        run: |
          cd artifacts/tradermind
          pnpm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync
        run: |
          cd artifacts/tradermind
          npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd artifacts/tradermind/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeForge-debug-apk
          path: artifacts/tradermind/android/app/build/outputs/apk/debug/app-debug.apk
